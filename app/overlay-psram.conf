# Octal PSRAM (issue #13). Enables the on-board 8 MB octal SPIRAM on the
# ESP32-S3-PICO-1-N8R8 and runs a boot self-test (app/src/psram.c) that proves
# the external RAM is mapped and read/writable. Uses no binary blobs.
#
# Build:  west build -p always -b m5stack_sticks3/esp32s3/procpu app \
#           -- -DEXTRA_CONF_FILE=overlay-psram.conf
#
# Mutually exclusive with Wi-Fi (overlay-wifi.conf): enabling SPIRAM breaks the
# Wi-Fi driver on the R8 silicon (empty scan / OOM). CONFIG_APP_PSRAM depends on
# !APP_WIFI, and a BUILD_ASSERT in main.c guards the raw CONFIG_ESP_SPIRAM +
# CONFIG_WIFI combination.
CONFIG_APP_PSRAM=y

# Octal-mode external PSRAM (consumes GPIO33-37). Kept at the default clock:
# CONFIG_SPIRAM_SPEED_80M (Espressif's recommended octal clock) pulls in
# mspi_timing_tuning, which references mspi_timing_config_* symbols that are not
# built in this configuration, so the link fails. The default speed builds and
# is enough to prove the RAM works, matching the in-tree esp32s3_eye octal board.
CONFIG_ESP_SPIRAM=y
CONFIG_SPIRAM_MODE_OCT=y

# CONFIG_ESP_SPIRAM auto-enables SHARED_MULTI_HEAP, and the SoC registers the
# 8 MB PSRAM (sized by the board's esp32s3_pico_n8r8.dtsi &psram0 node) as an
# external shared-multi-heap region; the self-test allocates from it.
CONFIG_SHARED_MULTI_HEAP=y

# System-heap pool, matching the upstream spiram_test sample.
CONFIG_HEAP_MEM_POOL_SIZE=98304
