# Wi-Fi station feature (gated app flag; mutually exclusive with overlay-ble).
# Force the BLE app gate off so a stray combined overlay cannot enable both; a
# BUILD_ASSERT in main.c also rejects CONFIG_WIFI + CONFIG_BT together.
CONFIG_APP_WIFI=y
CONFIG_APP_BLE=n

# ESP32-S3 native Wi-Fi driver + networking + station management.
CONFIG_WIFI=y
CONFIG_WIFI_ESP32=y
CONFIG_NETWORKING=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NET_IPV4=y
CONFIG_NET_DHCPV4=y

# No CONFIG_WIFI_NM_WPA_SUPPLICANT: the esp32 native driver brings its own
# (ESP-IDF) supplicant via hal_espressif and handles WPA2/WPA3 association.
# Enabling Zephyr's hostap-based supplicant conflicts with the HAL's bundled one
# (this is also why the upstream wifi shell sample does not enable it).

# net_mgmt events for scan results, connect/disconnect, and the IPv4 address.
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_MGMT_EVENT_INFO=y
CONFIG_NET_MGMT_EVENT_QUEUE_SIZE=16
CONFIG_NET_MGMT_EVENT_QUEUE_TIMEOUT=5000

# WPA2-PSK only. WPA3-SAE (CONFIG_ESP32_WIFI_ENABLE_WPA3_SAE) pulls the ESP32
# mbedTLS/PSA ECC crypto path, which does not build against this workspace's
# tf-psa-crypto (undeclared mbedtls_psa_external_random_context_t). A WPA3-only
# AP is a known limitation, left to a future enhancement.

# Entropy for the supplicant crypto (PSA/mbedTLS), from the on-board TRNG.
CONFIG_ENTROPY_GENERATOR=y

# The driver auto-starts DHCPv4 on connect (the single owner of DHCP); the glue
# must not also call net_dhcpv4_start. Matches the upstream wifi shell sample.
CONFIG_ESP32_WIFI_STA_AUTO_DHCPV4=y

# Stacks and buffers, from the upstream wifi shell sample baseline.
CONFIG_MAIN_STACK_SIZE=5200
CONFIG_NET_RX_STACK_SIZE=4096
CONFIG_NET_TX_STACK_SIZE=4096
CONFIG_NET_MGMT_EVENT_STACK_SIZE=2048
CONFIG_NET_TCP_WORKQ_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_NET_PKT_RX_COUNT=10
CONFIG_NET_PKT_TX_COUNT=10
CONFIG_NET_BUF_RX_COUNT=20
CONFIG_NET_BUF_TX_COUNT=20
CONFIG_NET_MAX_CONTEXTS=10

# Wi-Fi heap. The driver needs a 51200-byte minimum pool
# (HEAP_MEM_POOL_ADD_SIZE_ESP_WIFI); HEAP_MEM_POOL_SIZE takes the max of that and
# this value, so 98304 gives a single pool with ~47 KB of app headroom. SPIRAM
# is left off: enabling it has broken Wi-Fi on ESP32-S3 R8 (see ADR risks).
CONFIG_HEAP_MEM_POOL_SIZE=98304
