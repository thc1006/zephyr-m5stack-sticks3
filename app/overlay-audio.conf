#
# ES8311 audio overlay (P5) for the M5StickS3 validation app.
#
# Enable with:
#   west build -p always -b m5stack_sticks3/esp32s3/procpu app \
#       -- -DEXTRA_CONF_FILE=overlay-audio.conf
#
# This brings up the on-board ES8311 codec on I2S0 and adds an AUDIO page that
# plays a short 440 Hz beep on entry. CONFIG_APP_AUDIO is kept OUT of the
# default prj.conf so the standard build stays unchanged (no codec/I2S/DMA).

# App feature gate (adds src/audio.c, the AUDIO UI page, and audio_init()).
CONFIG_APP_AUDIO=y

# Audio subsystem + ES8311 codec (I2C control, I2S data).
CONFIG_AUDIO=y
CONFIG_AUDIO_CODEC=y
CONFIG_AUDIO_CODEC_ES8311=y

# I2S transport + GDMA (the esp32-i2s driver requires DMA on the esp32s3).
CONFIG_I2S=y
CONFIG_I2S_ESP32=y
CONFIG_DMA=y
