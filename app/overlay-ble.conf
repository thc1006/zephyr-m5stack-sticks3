#
# BLE telemetry overlay for the M5StickS3 validation app.
#
# Enable with:
#   west build -p always -b m5stack_sticks3/esp32s3/procpu app \
#       -- -DEXTRA_CONF_FILE=overlay-ble.conf
#
# This pulls in the Bluetooth host + the Espressif controller HAL blob, so run
#   west blobs fetch hal_espressif
# first. CONFIG_BT is intentionally kept OUT of the default prj.conf so the
# standard build stays blob-free and CI-green.

# App feature gate (adds src/ble.c, the BLE UI page, and the init/update calls).
CONFIG_APP_BLE=y

# Bluetooth LE, peripheral (GATT server) role only.
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y

# Advertised / GAP name. We place this name into the advertising data
# ourselves (BT_DATA_NAME_COMPLETE), so a dynamic name is not required.
CONFIG_BT_DEVICE_NAME="StickS3"

# GATT server with at least one connection and notifications enabled. The
# default peripheral connection count (1) is sufficient for the demo.
CONFIG_BT_GATT_DYNAMIC_DB=y
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=1
