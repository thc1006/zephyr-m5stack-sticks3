CONFIG_LOG=y
CONFIG_PRINTK=y
CONFIG_GPIO=y
CONFIG_INPUT=y
CONFIG_SENSOR=y
CONFIG_DISPLAY=y
CONFIG_REGULATOR=y
CONFIG_MFD=y
CONFIG_ADC=y
CONFIG_MAIN_STACK_SIZE=4096

# LCD power-rail init ordering (critical, see docs HW-003).
# The L3B regulator-fixed enables via the M5PM1 MFD gpio child, so it must
# init AFTER that gpio child (GPIO_M5PM1_INIT_PRIORITY=82) and BEFORE the
# display (DISPLAY_INIT_PRIORITY=85). The regulator-fixed default of 75 runs
# before the gpio child -> the enable-gpio write fails -> the LCD stays dark.
# Order: I2C(50) < MFD(80) < ADC_M5PM1(81) < GPIO_M5PM1(82) < regfixed(83) < display(85).
CONFIG_REGULATOR_FIXED_INIT_PRIORITY=83
