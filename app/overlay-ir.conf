# App feature gate (adds src/ir.c + src/nec.c, the IR UI page, and ir_init()).
CONFIG_APP_IR=y

# PWM drivers: LEDC drives the ~38 kHz IR TX carrier (G46); MCPWM input capture
# reads the IR receiver (G42). The board DTS already enables &ledc0 / &mcpwm0;
# these turn on the drivers (inert in the default build).
CONFIG_PWM=y
CONFIG_PWM_CAPTURE=y
