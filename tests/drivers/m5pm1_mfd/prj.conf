CONFIG_ZTEST=y

CONFIG_I2C=y
CONFIG_I2C_EMUL=y
CONFIG_EMUL=y

# On-board M5PM1 path: MFD parent + GPIO child + ADC child + regulator-fixed.
CONFIG_MFD=y
CONFIG_GPIO=y
CONFIG_ADC=y
CONFIG_REGULATOR=y

# MFD-path emulator (drivers/mfd/emul_m5pm1.c). Its own symbol so it can never
# clash with another M5PM1 emulator backend in the same image.
CONFIG_EMUL_M5PM1_MFD=y

# Match the on-board POST_KERNEL ordering: I2C(50) < MFD(80) < adc(81) <
# gpio(82) < regulator-fixed(83), so the regulator-fixed enables the rail
# only after the MFD and its GPIO child are ready (see app/prj.conf,
# docs/02_SDD.md, docs/03_TDD.md).
CONFIG_REGULATOR_FIXED_INIT_PRIORITY=83

CONFIG_LOG=y
